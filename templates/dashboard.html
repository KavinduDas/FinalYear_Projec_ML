{% extends 'layout.html' %}

{% block body %}
<div class="container">  <!-- or container-fluid if you want edge-to-edge -->
    <div class="row justify-content-center">  <!-- centers if not full width -->
        <div class="col-10 col-md-7 col-lg-8">  <!-- full on mobile, 10/12 on md, 8/12 on lg -->
            <div class="card card-style mb-2">
                <div class="card-body">
                    <div class="chart-container" style="position: relative; height: 400px; margin-top: 80px;">  <!-- ← add height! -->
                        <canvas id="income_vs_expense"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  const ctx = document.getElementById('income_vs_expense');

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Red', 'Blue', 'Yellow', 'Green', 'Purple', 'Orange'],
      datasets: [{
        label: '# of Votes',
        data: [12, 19, 3, 5, 2, 3],
        borderWidth: 1
      }]
    },
    options: {
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });
</script>

{% endblock %}
    
{% endblock %}
