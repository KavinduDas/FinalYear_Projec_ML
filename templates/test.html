{% block extra_js %}
<script>
  let modalChartInstance = null;

  // Function to select chart and update border
  function selectChart(type) {
    document.querySelectorAll('.chart-option').forEach(option => {
      option.style.border = '2px solid #e5e7eb';
    });
    event.currentTarget.style.border = '2px solid #9333ea';
    document.getElementById(type + 'Chart').checked = true;
    
    // Open modal and render the selected chart
    openChartModal(type);
  }

  // Function to open chart modal
  function openChartModal(type) {
    const modal = document.getElementById('chartModal');
    const modalTitle = document.getElementById('modalChartTitle');
    const modalCanvas = document.getElementById('modalChart');
    
    // Set title based on chart type
    const titles = {
      'bar': 'Bar Chart',
      'stackedBar': 'Stacked Bar Chart',
      'line': 'Line Chart',
      'pie': 'Pie Chart',
      'donut': 'Donut Chart',
      'scatter': 'Scatter Chart'
    };
    modalTitle.textContent = titles[type] || 'Chart View';
    
    // Show modal
    modal.style.display = 'flex';
    
    // Destroy previous chart instance if exists
    if (modalChartInstance) {
      modalChartInstance.destroy();
    }
    
    // Render the selected chart
    renderModalChart(type, modalCanvas);
  }

  // Function to close chart modal
  function closeChartModal() {
    const modal = document.getElementById('chartModal');
    modal.style.display = 'none';
    
    // Destroy chart instance when closing
    if (modalChartInstance) {
      modalChartInstance.destroy();
      modalChartInstance = null;
    }
